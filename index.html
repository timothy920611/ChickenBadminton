<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏸 雞雞羽球計分板 - 歡迎</title>
    <style>
        :root {
            --primary: #059669;
            --primary-hover: #047857;
            --secondary: #1f2937;
            --secondary-hover: #111827;
            --bg-gradient-start: #0f766e;
            --bg-gradient-end: #064e3b;
            --card-bg: #ffffff;
            --text-main: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 26px;
            color: var(--primary);
            margin-bottom: 30px;
            font-weight: bold;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 6px rgba(5, 150, 105, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background-color: var(--secondary-hover);
            transform: translateY(-2px);
        }

        /* Modal 樣式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--secondary);
            text-align: center;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 25px;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .btn-modal {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-cancel {
            background-color: #f3f4f6;
            color: #4b5563;
        }

        .btn-cancel:hover {
            background-color: #e5e7eb;
        }

        .btn-confirm {
            background-color: var(--primary);
            color: white;
        }

        .btn-confirm:hover {
            background-color: var(--primary-hover);
        }

        .btn-confirm:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">🏸</div>
        <h1>雞雞羽球計分板</h1>
        
        <!-- 新增對局：清空快取並進入 play.html -->
        <button class="btn btn-primary" onclick="startNewGame()">新增對局</button>
        
        <!-- 讀取舊資料：開啟 Modal 從 GitHub 抓取檔案 -->
        <button class="btn btn-secondary" onclick="openLoadModal()">讀取舊資料</button>
    </div>

    <!-- 讀取檔案的 Modal -->
    <div class="modal-overlay" id="loadModal">
        <div class="modal-content">
            <div class="modal-title">選擇要讀取的檔案</div>
            <select id="fileSelector">
                <option value="">載入檔案清單中...</option>
            </select>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeLoadModal()">取消</button>
                <button class="btn-modal btn-confirm" id="btnConfirmLoad" onclick="confirmLoad()">確定</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ☁️ 雲端設定區：防禦型 Token 混淆機制
        // ==========================================
        const GITHUB_OWNER = 'timothy920611';   
        const GITHUB_REPO = 'ChickenBadminton'; 
        const GITHUB_FOLDER = 'json';

        const NOISE = "5d5502d0e27ded4a977810d55f13e615c201fe6f7e1c0ff57641e034d75e2b2f";
        const OBFUSCATED_TOKEN = "Z2l0aHViX3BhdF8xMUI0TlFKR0EwUWJlSVdIcDRLeVdUX3RMbHJFSXVLMFdzWVF3Y2" + NOISE + "9LbEd5SFN1cXl6Z3dUQ04xTHdNSHJ0cndIWkdIQ1MzRUVOVG9XR1p5RTFC";
        
        function getRealToken() {
            try { 
                const cleanBase64 = OBFUSCATED_TOKEN.replace(NOISE, "");
                return atob(cleanBase64); 
            } catch (e) { 
                return null; 
            }
        }
        // ==========================================

        // 開啟新的一局
        function startNewGame() {
            // 清空本地存檔，確保進去是一張白紙
            localStorage.removeItem('badmintonData');
            // 跳轉至主程式
            window.location.href = 'play.html';
        }

        // Modal 控制
        const modal = document.getElementById('loadModal');
        
        function openLoadModal() {
            modal.style.display = 'flex';
            fetchFileList();
        }

        function closeLoadModal() {
            modal.style.display = 'none';
        }

        // 點擊背景關閉 Modal
        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeLoadModal();
        });

        // 從 GitHub 抓取檔案列表
        async function fetchFileList() {
            const selector = document.getElementById('fileSelector');
            const btnConfirm = document.getElementById('btnConfirmLoad');
            const token = getRealToken();
            
            selector.innerHTML = '<option value="">⏳ 載入清單中...</option>';
            btnConfirm.disabled = true;

            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FOLDER}?t=${Date.now()}`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                
                if (!res.ok) throw new Error('無法讀取');
                
                const files = await res.json();
                const jsonFiles = files.filter(f => f.name.endsWith('.json'));
                
                if (jsonFiles.length === 0) {
                    selector.innerHTML = '<option value="">目前尚無任何存檔</option>';
                    return;
                }
                
                // 將最新的檔案排在最前面
                selector.innerHTML = jsonFiles.reverse().map(f => `<option value="${f.name}">${f.name.replace('.json', '')}</option>`).join('');
                btnConfirm.disabled = false;
                
            } catch (e) {
                selector.innerHTML = '<option value="">❌ 無法讀取 GitHub 清單</option>';
            }
        }

        // 確認讀取並跳轉
        async function confirmLoad() {
            const selector = document.getElementById('fileSelector');
            const filename = selector.value;
            if (!filename) return;

            const btnConfirm = document.getElementById('btnConfirmLoad');
            const originalText = btnConfirm.innerText;
            btnConfirm.innerText = "讀取中...";
            btnConfirm.disabled = true;

            const path = `${GITHUB_FOLDER}/${filename}`;
            const token = getRealToken();

            try {
                // 1. 從 GitHub 抓取特定檔案內容
                const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}?t=${Date.now()}`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                
                if (!res.ok) throw new Error('找不到檔案');

                const json = await res.json();
                
                // 2. 解碼 Base64 內容 (處理中文)
                const decodedStr = decodeURIComponent(escape(atob(json.content)));
                
                // 3. 驗證是否為有效的 JSON
                const data = JSON.parse(decodedStr);

                // 4. 將抓到的資料寫入 LocalStorage，這樣 play.html 一開啓就會自動載入這份資料
                localStorage.setItem('badmintonData', JSON.stringify(data));
                
                // 5. 無縫跳轉至主程式
                window.location.href = 'play.html';

            } catch (e) {
                alert("❌ 讀取檔案失敗！請檢查網路或檔案是否毀損。");
                btnConfirm.innerText = originalText;
                btnConfirm.disabled = false;
            }
        }
    </script>
</body>
</html>
